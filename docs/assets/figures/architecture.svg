<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <style>
    .box { fill: #fcfcfb; stroke: #c3c2b7; rx: 10; }
    .layer { font-size: 11px; fill: #898781; letter-spacing: 1px; }
    .title { font-size: 15px; font-weight: 600; fill: #0b0b0b; }
    .desc { font-size: 12px; fill: #52514e; }
    .note { font-size: 11px; fill: #898781; font-style: italic; }
    .arrow { stroke: #898781; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#898781"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="20" width="450" height="72" rx="10"/>
  <text class="layer" x="36" y="42">LAYER 1 - src/lab</text>
  <text class="title" x="36" y="62">Simulation engine</text>
  <text class="desc" x="36" y="80">Populations with known ground truth, six pathologies, tested stats toolbox</text>
  <text class="note" x="490" y="60">every estimator checked against</text>
  <text class="note" x="490" y="76">a constructed answer key</text>

  <rect class="box" x="20" y="114" width="450" height="72" rx="10"/>
  <text class="layer" x="36" y="136">LAYER 2 - src/review_agent</text>
  <text class="title" x="36" y="156">Review agent</text>
  <text class="desc" x="36" y="174">Design in, decision memo out; every number computed by Layer 1</text>
  <text class="note" x="490" y="154">scored on 32 labeled designs</text>
  <text class="note" x="490" y="170">with confidence intervals</text>

  <rect class="box" x="20" y="208" width="450" height="72" rx="10"/>
  <text class="layer" x="36" y="230">LAYER 3 - docs</text>
  <text class="title" x="36" y="250">Explainer site</text>
  <text class="desc" x="36" y="268">Eight scrollytelling pages; every animation reads Layer 1 output</text>
  <text class="note" x="490" y="248">figures regenerate from one</text>
  <text class="note" x="490" y="264">command, enforced in CI</text>

  <path class="arrow" d="M 245 92 L 245 112"/>
  <path class="arrow" d="M 245 186 L 245 206"/>
</svg>
